<!DOCTYPE html>

<body>
    
    <header class="header">
        <h1 class="hero-title">Portfolio</h1>
        <nav class ="main-nav">
            <ul class="nav-list"> 
                <li><a href="index.html" > Home </a></li>
                <li><a href="about.html"> About us </a> </li>
                <li><a href="#gallery" > Gallery </a></li>
                <li><a href="#contacts" > Contacts </a></li>
                <li><a href="register.html">Registration</a></li>
            </ul>
        </nav>
    </header>
    <main class="page-layout">
        <h2>Registration</h2>
        <form action="#" method="POST" class="checkout-from">
            <fieldset>
                <legend>1. Особисті дані</legend>
                <div class="form-group">
                    <label for="fullName">ПІБ:</label>
                    <input
                        type="text"
                        id="fullName"
                        name="fullName"
                        required
                        placeholder="Іванов Іван Іванович"
                    />
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" 
                            id="email"
                            name="email" 
                            required
                            placeholder="your@email.com"
                     />
                </div>

                <div class="form-group">
                    <label for="phone">Телефон:</label>
                    <input
                        type="tel"
                        id="phone"
                        name="phone"
                        pattern="[\+]\d{2}\d{10}"
                        placeholder="+380991234567"
                        required
                        title="Формат: +380XXXXXXXXX"
                />
                </div>
            </fieldset>

            <fieldset>
                <textarea>Підтвердити</textarea>
                <div class="form-group">
                    <label for="policy-text">Умови підписки</label>
                    <textarea
                        id="policy-text"
                        name="policyText"
                        rows="2"
                        readonly>Погоджуючись, ви приймаєте політику конфіденційності та умови використання сайту</textarea>
                </div>
                
                <div class="form-group-policy">
                     <input type="checkbox" id="Policy" name="Policy" required>
                     <label for="Policy"> Я прочитав(-ла) та приймаю
                        <a href="#">політика сайту</a>
                     </label>
                </div>

                <button type="submit" class="btn1">Підтвердити підписку</button>

            </fieldset>
        </form>       
    </main>

    <footer id="footer" class="footer">
        <ul>
            <li> Phone: +380967823945 </li>
            <li> Email: luhjfj@gmail.com </li>
            <li> Adress: ifols mfjols fj 24</li>
        </ul>
        <form action="">
            <label for="email">Your email: </label>
            <input type="email" name="email" id="email"/>
            <input type="button" class="btn" value="Subscribe"/>
        </form>

</body>
